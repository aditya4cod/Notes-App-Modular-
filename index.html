<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteKeeper | Organize Your Thoughts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <h1>📝 NoteKeeper</h1>
            <div class="controls">
                <input type="text" id="searchInput" placeholder="Search notes..." aria-label="Search notes">
                <button id="addNoteBtn" class="btn-primary">+ Add Note</button>
            </div>
        </header>

        <!-- Main Notes Grid -->
        <main id="notesContainer" class="notes-grid">
            <!-- Notes will be injected here by JavaScript -->
        </main>
    </div>

    <!-- Modal for Creating/Editing Notes -->
    <div id="noteModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Note</h2>
                <button id="closeModalBtn" class="btn-close">&times;</button>
            </div>
            
            <form id="noteForm">
                <input type="hidden" id="noteId">
                
                <div class="form-group">
                    <input type="text" id="noteTitle" placeholder="Note Title" required>
                </div>
                
                <div class="form-group">
                    <textarea id="noteContent" rows="6" placeholder="Write your note here..." required></textarea>
                </div>

                <!-- Color Tag Selection -->
                <div class="form-group color-picker">
                    <label>Select Tag Color:</label>
                    <div class="color-options">
                        <span class="color-tag" data-color="#ffffff" style="background: #ffffff;"></span>
                        <span class="color-tag" data-color="#fef3c7" style="background: #fef3c7;"></span>
                        <span class="color-tag" data-color="#d1fae5" style="background: #d1fae5;"></span>
                        <span class="color-tag" data-color="#dbeafe" style="background: #dbeafe;"></span>
                        <span class="color-tag" data-color="#fce7f3" style="background: #fce7f3;"></span>
                        <span class="color-tag" data-color="#ede9fe" style="background: #ede9fe;"></span>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save Note</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
